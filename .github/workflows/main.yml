name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          # 1. Setup the SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. Define exactly where the files are based on your logs
          # Your logs show they are in the root directory
          INV="inventory/hosts"
          SITE_PB="site.yml"
          HAPROXY_PB="setup-haproxy.yml"

          # 3. Run Site Playbook
          # We check if common.yml exists first to avoid the include error
          echo "--- Running Site Playbook ---"
          ansible-playbook -i $INV $SITE_PB \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no"

          # 4. Run HAProxy Playbook
          echo "--- Running HAProxy Playbook ---"
          ansible-playbook -i $INV $HAPROXY_PB \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
