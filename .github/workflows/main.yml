name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key with absolute paths
          mkdir -p $HOME/.ssh
          echo "$SSH_KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa

          # 2. Dynamically find the inventory AND the playbook
          INV_PATH=$(find . -name "hosts" | head -n 1)
          PLAYBOOK_PATH=$(find . -name "site.yml" | head -n 1)

          if [ -z "$INV_PATH" ] || [ -z "$PLAYBOOK_PATH" ]; then
            echo "Error: Missing inventory ($INV_PATH) or playbook ($PLAYBOOK_PATH)"
            exit 1
          fi
          
          echo "Using Inventory: $INV_PATH"
          echo "Using Playbook: $PLAYBOOK_PATH"

          # 3. Run the playbook
          # We force 'IdentitiesOnly' so it doesn't try to use the runner's default keys
          echo "--- Starting Ansible Execution ---"
          ansible-playbook -i "$INV_PATH" "$PLAYBOOK_PATH" \
            --private-key $HOME/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-common-args="-o StrictHostKeyChecking=no -o IdentitiesOnly=yes"
