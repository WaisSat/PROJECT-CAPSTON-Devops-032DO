name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key for the vagrant user
          mkdir -p $HOME/.ssh
          echo "$SSH_KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa

          # 2. Set explicit paths based on your repository structure
          # site.yml is inside the ansible/ folder
          # inventory file 'hosts' is inside ansible/inventory/
          INV_PATH="ansible/inventory/hosts"
          PLAYBOOK_PATH="ansible/site.yml"

          # 3. Verification check
          echo "Checking for inventory at: $INV_PATH"
          if [ ! -f "$INV_PATH" ]; then
            echo "!!! ERROR: Inventory file not found at $INV_PATH !!!"
            echo "Contents of ansible/inventory/:"
            ls -la ansible/inventory/
            exit 1
          fi

          echo "Checking for playbook at: $PLAYBOOK_PATH"
          if [ ! -f "$PLAYBOOK_PATH" ]; then
            echo "!!! ERROR: Playbook site.yml not found at $PLAYBOOK_PATH !!!"
            exit 1
          fi

          # 4. Run the playbook
          # -e passes the sudo password
          # -o IdentitiesOnly ensures we use the key we just created
          echo "--- Starting Ansible Execution ---"
          ansible-playbook -i "$INV_PATH" "$PLAYBOOK_PATH" \
            --private-key $HOME/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-common-args="-o StrictHostKeyChecking=no -o IdentitiesOnly=yes"
