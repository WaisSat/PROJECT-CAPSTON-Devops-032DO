name: Ansible Full Stack Deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p $HOME/.ssh
          printf "%s" "$SSH_KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa

          # 2. Define Paths
          INV_PATH="ansible/inventory"
          COMMON_ARGS="-o StrictHostKeyChecking=no -o ControlMaster=no -o ConnectTimeout=60"
          
          echo "--- Starting Memory-Optimized Ansible Execution ---"

          # 3. Run Common Config in small subsets (3 nodes at a time)
          # This prevents the 'Killed' (137) error by limiting the active host list
          for group in "webservers" "dbservers" "others"; do
            echo "Processing group: $group"
            ansible-playbook -i "$INV_PATH" ansible/common.yml \
              --limit "$group" \
              --forks 1 \
              --private-key $HOME/.ssh/id_rsa \
              -u vagrant \
              -e "ansible_become_password=vagrant" \
              --ssh-common-args="$COMMON_ARGS"
          done

          # 4. Run Specific Setup Playbooks
          ansible-playbook -i "$INV_PATH" ansible/setup-db.yml \
            --forks 1 --private-key $HOME/.ssh/id_rsa -u vagrant -e "ansible_become_password=vagrant" --ssh-common-args="$COMMON_ARGS"

          ansible-playbook -i "$INV_PATH" ansible/site.yml \
            --forks 1 --private-key $HOME/.ssh/id_rsa -u vagrant -e "ansible_become_password=vagrant" --ssh-common-args="$COMMON_ARGS"
