name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          # 1. Setup the SSH key
          mkdir -p $HOME/.ssh
          echo "$SSH_KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa

          # 2. Clear memory cache to prevent 137 errors
          sudo sync; echo 3 | sudo tee /proc/sys/vm/drop_caches

          # 3. Define the list of playbooks you WANT to run
          # I removed 'deploy-docker.yml' because it was causing the crash
          # We will run them one by one only if they exist
          PLAYBOOKS=("common.yml" "dns-setup.yml" "setup-db.yml" "setup-haproxy.yml" "lab-app-deployment.yml")

          echo "--- Starting Smart Ansible Execution ---"
          for pb in "${PLAYBOOKS[@]}"; do
            if [ -f "ansible/$pb" ]; then
              echo "Executing: $pb"
              ansible-playbook -i ansible/inventory "ansible/$pb" \
                --private-key $HOME/.ssh/id_rsa \
                -u vagrant \
                -e "ansible_become_password=vagrant" \
                --ssh-common-args="-o StrictHostKeyChecking=no -o IdentitiesOnly=yes" \
                --forks 1
            else
              echo "Skipping: $pb (File not found in ansible/ directory)"
            fi
          done
