name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: [actions/checkout@v4](https://github.com/WaisSat/PROJECT-CAPSTON-Devops-032DO/settings)

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. Dynamically find the inventory file
          # This looks for a file named 'hosts' anywhere in the repo
          INV_PATH=$(find . -name "hosts" | head -n 1)

          if [ -z "$INV_PATH" ]; then
            echo "Error: Could not find an inventory file named 'hosts' in the repository."
            exit 1
          fi
          
          echo "Using Inventory found at: $INV_PATH"

          # 3. Run the playbook
          # We add '-e' to pass the become password for your vagrant user
          echo "--- Starting Ansible Execution ---"
          ansible-playbook -i "$INV_PATH" site.yml \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
