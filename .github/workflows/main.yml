name: Local-Deploy-Check
on: [push]

jobs:
  deploy:
    # CHANGE THIS LINE from 'ubuntu-latest' to 'self-hosted'
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Run Ansible Ping
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
        run: |
          echo "$SSH_KEY" > private_key.pem
          chmod 600 private_key.pem
          ansible all -i inventory -m ping --private-key private_key.pem -u vagrant -o
