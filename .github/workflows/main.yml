name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. DEBUG: Show exactly where we are and what files exist
          echo "--- Current Directory Structure ---"
          ls -R

          # 3. Find and Run Playbooks
          # We use 'find' to get the absolute path so we don't have to guess folders
          SITE_PLAYBOOK=$(find . -name "site.yml" | head -n 1)
          HAPROXY_PLAYBOOK=$(find . -name "setup-haproxy.yml" | head -n 1)
          INVENTORY_PATH=$(find . -name "hosts" | grep "inventory" | head -n 1)

          echo "Using Inventory: $INVENTORY_PATH"
          echo "Using Site Playbook: $SITE_PLAYBOOK"
          echo "Using HAProxy Playbook: $HAPROXY_PLAYBOOK"

          # 4. Execute Playbooks
          if [ -f "$SITE_PLAYBOOK" ]; then
            ansible-playbook -i "$INVENTORY_PATH" "$SITE_PLAYBOOK" \
              --private-key ~/.ssh/id_rsa \
              -u vagrant \
              --ssh-extra-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          fi

          if [ -f "$HAPROXY_PLAYBOOK" ]; then
            ansible-playbook -i "$INVENTORY_PATH" "$HAPROXY_PLAYBOOK" \
              --private-key ~/.ssh/id_rsa \
              -u vagrant \
              --ssh-extra-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          fi
