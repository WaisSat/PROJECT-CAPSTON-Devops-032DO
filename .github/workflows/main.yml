name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. FIND EVERYTHING
          # This finds the files regardless of which folder they are in
          REAL_INV=$(find . -name "hosts" | grep "inventory" | head -n 1)
          REAL_SITE=$(find . -name "site.yml" | head -n 1)
          
          # 3. FIX THE PATHS
          # We move into the folder where site.yml actually lives 
          # so it can find 'common.yml' and the others relative to it.
          PLAYBOOK_DIR=$(dirname "$REAL_SITE")
          cd "$PLAYBOOK_DIR"

          echo "--- Starting Deployment from $PLAYBOOK_DIR ---"
          echo "Using Inventory: $REAL_INV"

          # 4. Run the Playbook
          # We use "../../" for inventory if we moved folders
          ansible-playbook -i "../$REAL_INV" site.yml \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
