name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          mkdir -p ~/.ssh
          cat <<EOF > ~/.ssh/id_rsa
          ${{ secrets.ANSIBLE_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa

          echo "--- Running Web Setup ---"
          ansible-playbook -i inventory setup_web.yml --private-key ~/.ssh/id_rsa -u vagrant -o StrictHostKeyChecking=no

          echo "--- Running LB Setup ---"
          ansible-playbook -i inventory setup_lb.yml --private-key ~/.ssh/id_rsa -u vagrant -o StrictHostKeyChecking=no
