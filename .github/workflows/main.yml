name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Debug: Check environment
          echo "Current User: $(whoami)"
          echo "Current Directory: $(pwd)"
          
          # 2. Setup the SSH key
          mkdir -p $HOME/.ssh
          echo "$SSH_KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa
          
          # 3. Find files and FAIL LOUDLY if they are missing
          INV_PATH=$(find . -name "hosts" | head -n 1)
          PLAYBOOK_PATH=$(find . -name "site.yml" | head -n 1)

          if [ -z "$INV_PATH" ]; then echo "!!! INVENTORY NOT FOUND !!!"; exit 1; fi
          if [ -z "$PLAYBOOK_PATH" ]; then echo "!!! PLAYBOOK NOT FOUND !!!"; exit 1; fi

          echo "Using Inventory: $INV_PATH"
          echo "Using Playbook: $PLAYBOOK_PATH"

          # 4. Run Ansible with verbose output (-vv) to see exactly where it stops
          echo "--- Starting Ansible Execution ---"
          ansible-playbook -i "$INV_PATH" "$PLAYBOOK_PATH" \
            --private-key $HOME/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-common-args="-o StrictHostKeyChecking=no -o IdentitiesOnly=yes" -vv
