name: Local-Deploy-Check
on: [push]

jobs:
  deploy:
    # CHANGE THIS LINE from 'ubuntu-latest' to 'self-hosted'
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: false
      - name: Run Ansible Ping
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
        run: |
         - name: Run Ansible Ping
           run: |
            ansible all -i inventory -m ping
