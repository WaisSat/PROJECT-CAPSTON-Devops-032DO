name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. DYNAMIC PATH DISCOVERY
          # This finds the files no matter what folder they are in
          INVENTORY=$(find . -name "hosts" | grep "inventory" | head -n 1)
          SITE_PB=$(find . -name "site.yml" | head -n 1)
          HAPROXY_PB=$(find . -name "setup-haproxy.yml" | head -n 1)

          echo "--- Discovery Results ---"
          echo "Inventory: $INVENTORY"
          echo "Site Playbook: $SITE_PB"
          echo "HAProxy Playbook: $HAPROXY_PB"
          echo "------------------------"

          # 3. Execute Site Playbook (Web/App)
          if [ -f "$SITE_PB" ]; then
            ansible-playbook -i "$INVENTORY" "$SITE_PB" \
              --private-key ~/.ssh/id_rsa \
              -u vagrant \
              --ssh-extra-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          else
            echo "Error: site.yml not found in repository!" && exit 1
          fi

          # 4. Execute HAProxy Playbook (Load Balancer)
          if [ -f "$HAPROXY_PB" ]; then
            ansible-playbook -i "$INVENTORY" "$HAPROXY_PB" \
              --private-key ~/.ssh/id_rsa \
              -u vagrant \
              --ssh-extra-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
          else
            echo "Error: setup-haproxy.yml not found in repository!" && exit 1
          fi
