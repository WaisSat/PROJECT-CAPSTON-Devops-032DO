name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    # We force the use of bash to ensure commands like 'find' and '$HOME' work 
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          # 1. Ensure we are in the right spot
          cd $GITHUB_WORKSPACE
          
          # 2. Setup SSH Key with a check
          mkdir -p $HOME/.ssh
          if [ -z "$SSH_KEY" ]; then echo "SECRET ANSIBLE_SSH_KEY IS EMPTY"; exit 1; fi
          echo "$SSH_KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa

          # 3. Find files using absolute paths within the workspace
          INV_PATH=$(find . -maxdepth 3 -name "hosts" | head -n 1)
          PLAYBOOK_PATH=$(find . -maxdepth 3 -name "site.yml" | head -n 1)

          echo "DEBUG: Inventory located at $INV_PATH"
          echo "DEBUG: Playbook located at $PLAYBOOK_PATH"

          if [[ -z "$INV_PATH" || -z "$PLAYBOOK_PATH" ]]; then
            echo "Error: Critical files missing. Files in directory:"
            ls -R
            exit 1
          fi

          # 4. Run Ansible with absolute binary path if possible
          # We use -v to get enough info without flooding the screen
          ansible-playbook -i "$INV_PATH" "$PLAYBOOK_PATH" \
            --private-key $HOME/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-common-args="-o StrictHostKeyChecking=no -o IdentitiesOnly=yes" -v
