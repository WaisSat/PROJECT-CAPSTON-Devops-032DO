name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Debug Folder Structure
        run: |
          echo "Currently in: $(pwd)"
          echo "Files in this workspace:"
          ls -R

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
        run: |
          # 1. Setup the SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. Find the Inventory and Playbooks
          # We use 'find' so we don't have to guess the folder name
          INV=$(find . -name "hosts" | grep "inventory" | head -n 1)
          SITE=$(find . -name "site.yml" | head -n 1)
          HAPROXY=$(find . -name "setup-haproxy.yml" | head -n 1)

          echo "Using Inventory: $INV"
          echo "Using Site Playbook: $SITE"
          echo "Using HAProxy Playbook: $HAPROXY"

          # 3. Run Site Playbook
          if [ -z "$SITE" ]; then echo "site.yml missing!" && exit 1; fi
          ansible-playbook -i "$INV" "$SITE" \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no"

          # 4. Run HAProxy Playbook
          if [ -z "$HAPROXY" ]; then echo "setup-haproxy.yml missing!" && exit 1; fi
          ansible-playbook -i "$INV" "$HAPROXY" \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
