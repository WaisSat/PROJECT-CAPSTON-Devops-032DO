name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-infrastructure:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Ansible Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key once for the whole run
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat <<EOF > ~/.ssh/id_rsa
          ${{ secrets.ANSIBLE_SSH_KEY }}
          EOF
          chmod 600 ~/.ssh/id_rsa

          # 2. Deploy Web Servers
          echo "Starting Web Server Deployment..."
          ansible-playbook -i inventory setup_web.yml \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          # 3. Deploy Load Balancer
          echo "Starting Load Balancer Deployment..."
          ansible-playbook -i inventory setup_lb.yml \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
