name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. Run Web Setup 
          # (Using site.yml since setup-webservers was deleted)
          echo "--- Running Site Setup ---"
          ansible-playbook -i inventory/hosts site.yml \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

          # 3. Run LB Setup (Corrected Path based on your 'ls')
          echo "--- Running LB Setup ---"
          ansible-playbook -i inventory/hosts setup-haproxy.yml \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"
