name: Ansible Full Stack Deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key correctly
          mkdir -p $HOME/.ssh
          printf "%s" "$SSH_KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa

          # 2. Define Paths and SSH Optimizations
          INV_PATH="ansible/inventory"
          COMMON_ARGS="-o StrictHostKeyChecking=no -o ControlMaster=no -o ConnectTimeout=60"
          
          echo "--- Starting Memory-Optimized Ansible Execution ---"

          # 3. Process nodes individually or in very small groups to avoid Error 137
          # Removed 'all' to prevent massive memory spikes
          for target in "webservers" "dbservers" "lb" "prdx-dns101" "prdx-nagios101" "prdx-dprimary101" "prdx-kube101"; do
            echo "Processing target: $target"
            ansible-playbook -i "$INV_PATH" ansible/common.yml \
              --limit "$target" \
              --forks 1 \
              --private-key $HOME/.ssh/id_rsa \
              -u vagrant \
              -e "ansible_become_password=vagrant" \
              --ssh-common-args="$COMMON_ARGS" || true
          done

          # 4. Run Database specific setup
          echo "--- Running Database Setup ---"
          ansible-playbook -i "$INV_PATH" ansible/setup-db.yml \
            --limit "dbservers" \
            --forks 1 \
            --private-key $HOME/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-common-args="$COMMON_ARGS"

          # 5. Run Main Site deployment
          echo "--- Running Site Deployment ---"
          ansible-playbook -i "$INV_PATH" ansible/site.yml \
            --limit "webservers" \
            --forks 1 \
            --private-key $HOME/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-common-args="$COMMON_ARGS"
