name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. Set the explicit inventory path
          # Based on your file structure, it should be in ansible/inventory/hosts
          INV_PATH="ansible/inventory/hosts"

          # 3. Verify the inventory file exists to prevent a root-directory scan
          if [ ! -f "$INV_PATH" ]; then
            echo "Error: Inventory file not found at $INV_PATH"
            echo "Searching for valid 'hosts' files to help you debug:"
            find . -name "hosts"
            exit 1
          fi

          echo "Using Inventory: $INV_PATH"

          # 4. Run the playbook
          echo "--- Starting Ansible Execution ---"
          ansible-playbook -i "$INV_PATH" site.yml \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
