name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. Find the correct inventory file (specifically the 'hosts' file)
          # This prevents Ansible from trying to parse Vagrantfiles/PHP files
          INV_PATH=$(find . -path "*/inventory/hosts" | head -n 1)
          echo "Using Inventory: $INV_PATH"

          # 3. Run the playbook
          # We use the site.yml located in the root.
          echo "--- Starting Ansible Execution ---"
          ansible-playbook -i "$INV_PATH" site.yml \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
