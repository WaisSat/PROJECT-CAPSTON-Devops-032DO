name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      # This fixes the Node.js deprecation warning
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. DEBUG: Let's see exactly where the files are
          echo "--- Current Directory Structure ---"
          ls -R

          # 3. FIND THE INVENTORY
          # We search for the 'hosts' file specifically to avoid the 'Unable to parse' error
          INV_PATH=$(find . -name "hosts" | grep "inventory" | head -n 1)
          
          # 4. RUN ANSIBLE
          # We run from the root and point to the inventory found
          echo "--- Starting Ansible ---"
          ansible-playbook -i "$INV_PATH" site.yml \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
