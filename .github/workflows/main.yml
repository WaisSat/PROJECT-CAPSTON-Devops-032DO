name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup SSH Key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          # 2. Run from the correct directory
          # We 'cd' into the folder where site.yml lives so it can find common.yml
          # Change 'ansible' below if your folder has a different name
          cd ansible 

          ansible-playbook -i ../inventory/hosts site.yml \
            --private-key ~/.ssh/id_rsa \
            -u vagrant \
            --ssh-extra-args="-o StrictHostKeyChecking=no"
