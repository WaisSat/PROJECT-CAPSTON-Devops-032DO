name: Ansible Full Stack Deployment

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p $HOME/.ssh
          echo "$SSH_KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa

          # 2. Define Paths
          INV_PATH="ansible/inventory"
          
          # 3. Run playbooks with --forks 3 to prevent Out of Memory (Error 137)
          echo "--- Starting Ansible Execution ---"
          
          # Run common config (Limited to 3 parallel workers)
          ansible-playbook -i "$INV_PATH" ansible/common.yml \
            --forks 3 \
            --private-key $HOME/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-common-args="-o StrictHostKeyChecking=no"

          # Run Database setup
          ansible-playbook -i "$INV_PATH" ansible/setup-db.yml \
            --forks 3 \
            --private-key $HOME/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-common-args="-o StrictHostKeyChecking=no"

          # Run Main Site deployment
          ansible-playbook -i "$INV_PATH" ansible/site.yml \
            --forks 3 \
            --private-key $HOME/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-common-args="-o StrictHostKeyChecking=no"
