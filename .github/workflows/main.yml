name: Ansible Full Stack Deployment

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # Optimization: Prevents Ansible from eating up RAM with massive fact gathering
      ANSIBLE_GATHERING: smart
      ANSIBLE_GATHER_SUBSET: network,virtual
    
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Execute Playbooks
        env:
          SSH_KEY: ${{ secrets.ANSIBLE_SSH_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: "False"
          ANSIBLE_STDOUT_CALLBACK: yaml
        run: |
          # 1. Setup the SSH key
          mkdir -p $HOME/.ssh
          echo "$SSH_KEY" > $HOME/.ssh/id_rsa
          chmod 600 $HOME/.ssh/id_rsa

          # 2. Paths (Verified from your previous logs)
          INV_PATH="ansible/inventory"
          PLAYBOOK_PATH="ansible/site.yml"

          # 3. Memory Management: Clear Controller Cache before starting
          # This helps prevent the 'Exit Code 137'
          sudo sync; echo 3 | sudo tee /proc/sys/vm/drop_caches

          # 4. Run the playbook with strict resource limits
          # --forks 1: Processes nodes one by one to save RAM
          echo "--- Starting Memory-Safe Ansible Execution ---"
          ansible-playbook -i "$INV_PATH" "$PLAYBOOK_PATH" \
            --private-key $HOME/.ssh/id_rsa \
            -u vagrant \
            -e "ansible_become_password=vagrant" \
            --ssh-common-args="-o StrictHostKeyChecking=no -o IdentitiesOnly=yes" \
            --forks 1
