---
- name: Configure HAProxy Load Balancer
  hosts: prdx-haproxy101
  become: yes
  tasks:
    - name: Install HAProxy
      dnf:
        name: haproxy
        state: present

    - name: Configure HAProxy
      copy:
        dest: /etc/haproxy/haproxy.cfg
        content: |
          global
              log /dev/log local0
              maxconn 2048

          defaults
              log global
              mode http
              timeout connect 5000
              timeout client 50000
              timeout server 50000

          frontend http_front
              bind *:80
              default_backend web_servers

          backend web_servers
              balance roundrobin
              server prdx-webserver101 192.168.56.21:80 check
              server prdx-webserver102 192.168.56.22:80 check
              server prdx-webserver103 192.168.56.23:80 check

    - name: Ensure HAProxy is enabled and started
      service:
        name: haproxy
        state: restarted
        enabled: yes

    - name: Allow HTTP in firewall
      firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes