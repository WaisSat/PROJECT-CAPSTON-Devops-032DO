---
- name: Install Nagios NRPE Agent on all Clients
  hosts: all:!prdx-nagios101:!prdx-ansible101
  become: yes
  tasks:
    - name: Install NRPE and common plugins
      dnf:
        name:
          - nrpe
          - nagios-plugins-load
          - nagios-plugins-disk
          - nagios-plugins-procs
          - nagios-plugins-users
        state: present

    - name: Configure NRPE to allow Nagios server
      lineinfile:
        path: /etc/nagios/nrpe.cfg
        regexp: '^allowed_hosts='
        line: 'allowed_hosts=127.0.0.1,::1,192.168.56.40'
        state: present

    - name: Start and enable NRPE service
      service:
        name: nrpe
        state: started
        enabled: yes

    - name: Open NRPE port in firewall
      firewalld:
        port: 5666/tcp
        permanent: yes
        state: enabled
        immediate: yes
