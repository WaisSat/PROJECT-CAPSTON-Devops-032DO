---
- name: Configure Apache Web Servers
  hosts: webservers
  become: yes
  tasks:
    - name: Install Apache and PHP
      dnf:
        name:
          - httpd
          - php
        state: present

    - name: Start and enable Apache
      service:
        name: httpd
        state: started
        enabled: yes

    - name: Open HTTP port in firewall
      firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes

    - name: Create index.php with Random Branding
      copy:
        dest: /var/www/html/index.php
        content: |
          <?php
            // Define an array of colors to rotate through
            $colors = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22', '#16a085'];
            $randomColor = $colors[array_rand($colors)];
          ?>
          <html>
          <head>
            <title>ZiyoTek Capstone - Web Cluster</title>
            <style>
              body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f7f6; padding-top: 50px; }
              .card { 
                background: white; 
                border-radius: 8px; 
                box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
                display: inline-block; 
                padding: 40px; 
                border-top: 8px solid <?php echo $randomColor; ?>; 
                transition: border-top 0.3s ease;
              }
              h1 { color: #2c3e50; margin-bottom: 10px; }
              .engineer { color: #16a085; font-size: 1.4em; font-weight: bold; }
              .node-info { background: #ecf0f1; padding: 15px; border-radius: 5px; margin-top: 20px; font-family: monospace; }
              .time { color: #7f8c8d; font-size: 0.9em; margin-top: 10px; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>ZiyoTek Capstone Project</h1>
              <p class="engineer">DevSecOps Engineer: Wais Satari</p>
              <div class="node-info">
                <p><b>Server Hostname:</b> <?php echo gethostname(); ?></p>
                <p><b>Server IP:</b> <?php echo $_SERVER['SERVER_ADDR']; ?></p>
              </div>
              <p class="time">Generated at: <?php echo date('Y-m-d H:i:s'); ?></p>
            </div>
          </body>
          </html>