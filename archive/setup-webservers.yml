---
- name: Configure Apache Web Servers
  hosts: webservers
  become: yes
  tasks:
    - name: Install Apache and PHP packages
      yum:
        name:
          - httpd
          - php
          - php-mysqlnd
        state: present

    - name: Remove old index.html
      file:
        path: /var/www/html/index.html
        state: absent

    - name: Deploy Dynamic Branding Page
      copy:
        dest: /var/www/html/index.php
        content: |
          <?php
            $colors = ['#e74c3c', '#3498db', '#2ecc71', '#f1c40f', '#9b59b6', '#e67e22', '#16a085'];
            $randomColor = $colors[array_rand($colors)];
          ?>
          <!DOCTYPE html>
          <html>
          <head>
            <title>ZiyoTek Capstone - Web Cluster</title>
            <style>
              body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background-color: #f4f7f6; padding-top: 50px; }
              .card { 
                background: white; 
                border-radius: 8px; 
                box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
                display: inline-block; 
                padding: 40px; 
                border-top: 10px solid <?php echo $randomColor; ?>; 
              }
              .node-info { background: #ecf0f1; padding: 15px; border-radius: 5px; margin-top: 20px; font-family: monospace; font-size: 1.2em; }
            </style>
          </head>
          <body>
            <div class="card">
              <h1>ZiyoTek Capstone Project</h1>
              <p style="color: #16a085; font-weight: bold;">Engineer: Wais Satari</p>
              <div class="node-info">
                <p><b>Server:</b> <?php echo gethostname(); ?></p>
                <p><b>Load Balancer Check:</b> <span style="color:green;">ACTIVE</span></p>
              </div>
              <p style="color: #7f8c8d; font-size: 0.8em;">Refreshed at: <?php echo date('H:i:s'); ?></p>
            </div>
          </body>
          </html>
        owner: apache
        group: apache
        mode: '0644'

    - name: Restart Apache to enable PHP
      service:
        name: httpd
        state: restarted
        enabled: yes

    - name: Open HTTP port in firewall
      firewalld:
        service: http
        permanent: yes
        state: enabled
        immediate: yes