---
- name: Configure Nagios Host Definitions
  hosts: prdx-nagios101
  become: yes
  tasks:
    - name: Create directory for host configs
      file:
        path: /etc/nagios/conf.d/hosts
        state: directory
        mode: '0755'

    - name: Define Webservers in Nagios
      copy:
        dest: "/etc/nagios/conf.d/hosts/{{ item.name }}.cfg"
        content: |
          define host {
              use                     linux-server
              host_name               {{ item.name }}
              alias                   {{ item.alias }}
              address                 {{ item.ip }}
          }

          define service {
              use                     generic-service
              host_name               {{ item.name }}
              service_description     HTTP
              check_command           check_http
          }

          define service {
              use                     generic-service
              host_name               {{ item.name }}
              service_description     CPU Load
              check_command           check_nrpe!check_load
          }
      loop:
        - { name: 'prdx-webserver101', alias: 'Web 1', ip: '192.168.56.21' }
        - { name: 'prdx-webserver102', alias: 'Web 2', ip: '192.168.56.22' }
        - { name: 'prdx-webserver103', alias: 'Web 3', ip: '192.168.56.23' }

    - name: Define DB Server in Nagios
      copy:
        dest: "/etc/nagios/conf.d/hosts/prdx-db101.cfg"
        content: |
          define host {
              use                     linux-server
              host_name               prdx-db101
              alias                   Database Server
              address                 192.168.56.11
          }

          define service {
              use                     generic-service
              host_name               prdx-db101
              service_description     Disk Usage
              check_command           check_nrpe!check_hda1
          }

    - name: Restart Nagios to apply changes
      service:
        name: nagios
        state: restarted
