---
- name: Harden Servers
  hosts: all
  become: yes
  tasks:
    - name: Disable SELinux
      selinux:
        policy: targeted
        state: disabled

    - name: Ensure firewalld is enabled
      service:
        name: firewalld
        state: started
        enabled: yes

    - name: Disable root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^PermitRootLogin'
        line: 'PermitRootLogin no'
      notify: Restart SSH

  handlers:
    - name: Restart SSH
      service:
        name: sshd
        state: restarted