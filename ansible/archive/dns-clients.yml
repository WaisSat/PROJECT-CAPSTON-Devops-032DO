---
- name: Configure DNS Clients
  hosts: all:!prdx-dns101:!prdx-ansible101
  become: yes
  tasks:
    - name: Force internal DNS as the primary resolver
      copy:
        dest: /etc/resolv.conf
        content: |
          # Generated by Ansible for Capstone Project
          nameserver 192.168.56.10
          nameserver 8.8.8.8
        owner: root
        group: root
        mode: '0644'