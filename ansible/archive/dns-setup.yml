---
- name: DNS Final Connectivity Repair
  hosts: prdx-dns101
  become: yes
  tasks:
    - name: Ensure firewalld is started and enabled
      service:
        name: firewalld
        state: started
        enabled: yes

    - name: Open Firewall for DNS
      firewalld:
        service: dns
        permanent: yes
        state: enabled
        immediate: yes

    - name: Configure named.conf to listen on ALL interfaces
      copy:
        dest: /etc/named.conf
        content: |
          acl "trusted" {
                  127.0.0.0/8;
                  192.168.56.0/24;
          };

          options {
              # listen-on must be 'any' so it hears the DB server
              listen-on port 53 { any; }; 
              listen-on-v6 { none; };
              directory "/var/named";
              
              allow-query { any; };
              allow-query-cache { any; };
              allow-recursion { trusted; };
              recursion yes;
              
              forwarders { 
                  8.8.8.8; 
                  8.8.4.4; 
              };
              dnssec-validation no;
          };

          zone "ziyotek.local" IN {
              type master;
              file "ziyotek.local.zone";
          };
        owner: root
        group: named
        mode: '0640'

    - name: Restart BIND
      service:
        name: named
        state: restarted
        enabled: yes