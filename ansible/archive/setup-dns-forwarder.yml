---
- name: Configure BIND Forwarders
  hosts: prdx-dns101
  become: yes
  tasks:
    - name: Add forwarders to named.conf
      lineinfile:
        path: /etc/named.conf
        insertafter: 'recursion yes;'
        line: '        forwarders { 8.8.8.8; 8.8.4.4; };'
        state: present

    - name: Restart BIND service
      service:
        name: named
        state: restarted