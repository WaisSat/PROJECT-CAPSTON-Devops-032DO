---
- name: Configure HAProxy Load Balancer
  hosts: prdx-haproxy101
  become: yes
  tasks:
    - name: Install HAProxy
      package:
        name: haproxy
        state: present

    - name: Configure HAProxy Config
      copy:
        dest: /etc/haproxy/haproxy.cfg
        content: |
          global
              user haproxy
              group haproxy
              daemon
          defaults
              mode http
              timeout connect 5000ms
              timeout client 50000ms
              timeout server 50000ms
          frontend http-in
              bind *:80
              default_backend web-backend
          backend web-backend
              balance roundrobin
              server s1 192.168.56.21:80 check
              server s2 192.168.56.22:80 check

    - name: Open Firewall Ports (Resilient Method)
      shell: |
        if command -v firewall-cmd >/dev/null 2>&1 && systemctl is-active --quiet firewalld; then
          firewall-cmd --permanent --add-port=80/tcp
          firewall-cmd --permanent --add-port=8080/tcp
          firewall-cmd --reload
        else
          echo "Firewall not running or not installed, skipping..."
        fi
      ignore_errors: yes

    - name: Ensure HAProxy is started
      service:
        name: haproxy
        state: restarted
        enabled: yes