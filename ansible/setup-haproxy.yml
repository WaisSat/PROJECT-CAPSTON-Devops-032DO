# Version 3 Forced Update
---
- name: Configure HAProxy Load Balancer
  hosts: prdx-haproxy101
  become: yes
  tasks:
    - name: Install HAProxy
      package:
        name: haproxy
        state: present

    - name: Configure HAProxy Config
      copy:
        dest: /etc/haproxy/haproxy.cfg
        content: |
          global
              log         127.0.0.1 local2
              chroot      /var/lib/haproxy
              pidfile     /var/run/haproxy.pid
              maxconn     4000
              user        haproxy
              group       haproxy
              daemon

          defaults
              mode                    http
              log                     global
              option                  httplog
              option                  dontlognull
              timeout connect         10s
              timeout client          1m
              timeout server          1m

          frontend http-in
              bind *:80
              default_backend web-backend

          backend web-backend
              balance roundrobin
              server prdx-webserver101 192.168.56.21:80 check
              server prdx-webserver102 192.168.56.22:80 check
              server prdx-webserver103 192.168.56.23:80 check

    - name: Open Firewall Ports (Resilient Method)
      shell: |
        if command -v firewall-cmd >/dev/null 2>&1 && systemctl is-active --quiet firewalld; then
          firewall-cmd --permanent --add-port=80/tcp
          firewall-cmd --permanent --add-port=8080/tcp
          firewall-cmd --reload
        else
          echo "Firewall not running or not installed, skipping..."
        fi
      ignore_errors: yes

    - name: Ensure HAProxy is started
      service:
        name: haproxy
        state: restarted
        enabled: yes
