---
- name: Configure HAProxy Load Balancer
  hosts: prdx-haproxy101
  become: yes
  tasks:
    - name: Check if firewalld is installed
      command: systemctl list-unit-files firewalld.service
      register: firewalld_check
      failed_when: false
      changed_when: false

    - name: Ensure firewalld is running (only if installed)
      service:
        name: firewalld
        state: started
        enabled: yes
      when: "'firewalld.service' in firewalld_check.stdout"
      ignore_errors: yes

    - name: Install HAProxy
      package:
        name: haproxy
        state: present

    - name: Configure HAProxy with Stats Page
      copy:
        dest: /etc/haproxy/haproxy.cfg
        content: |
          global
              log         127.0.0.1 local2
              chroot      /var/lib/haproxy
              pidfile     /var/run/haproxy.pid
              maxconn     4000
              user        haproxy
              group       haproxy
              daemon

          defaults
              mode                    http
              log                     global
              option                  httplog
              option                  dontlognull
              timeout connect         10s
              timeout client          1m
              timeout server          1m

          listen stats
              bind *:8080
              stats enable
              stats uri /stats
              stats refresh 5s
              stats auth admin:password

          frontend http_front
              bind *:80
              default_backend web_servers

          backend web_servers
              balance roundrobin
              option httpchk HEAD /index.php
              server prdx-webserver101 192.168.56.21:80 check
              server prdx-webserver102 192.168.56.22:80 check
              server prdx-webserver103 192.168.56.23:80 check

    - name: Allow HTTP and Stats Port in firewall
      shell: |
        firewall-cmd --permanent --add-port=80/tcp
        firewall-cmd --permanent --add-port=8080/tcp
        firewall-cmd --reload
      when: "'firewalld.service' in firewalld_check.stdout"
      ignore_errors: yes

    - name: Ensure HAProxy is restarted
      service:
        name: haproxy
        state: restarted
        enabled: yes