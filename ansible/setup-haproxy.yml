---
# Forced Update v2
- name: Configure HAProxy Load Balancer
  hosts: prdx-haproxy101
  become: yes
  tasks:
    - name: Ensure firewalld is running
      service:
        name: firewalld
        state: started
        enabled: yes
      ignore_errors: yes

    - name: Install HAProxy
      package:
        name: haproxy
        state: present

    - name: Configure HAProxy with Stats Page
      copy:
        dest: /etc/haproxy/haproxy.cfg
        content: |
          global
              log         127.0.0.1 local2
              chroot      /var/lib/haproxy
              pidfile     /var/run/haproxy.pid
              maxconn     4000
              user        haproxy
              group       haproxy
              daemon
          defaults
              mode                    http
              log                     global
              option                  httplog
              option                  dontlognull
              timeout connect         10s
              timeout client          1m
              timeout server          1m
          listen stats
              bind *:8080
              stats enable
              stats uri /stats
              stats refresh 5s
              stats auth admin:password
          frontend http_front
              bind *:80
              default_backend web_servers
          backend web_servers
              balance roundrobin
              option httpchk HEAD /index.php
              server prdx-webserver101 192.168.56.21:80 check
              server prdx-webserver102 192.168.56.22:80 check
              server prdx-webserver103 192.168.56.23:80 check

    - name: Allow HTTP and Stats Port in firewall
      firewalld:
        port: "{{ item }}"
        permanent: yes
        state: enabled
        immediate: yes
      loop:
        - 80/tcp
        - 8080/tcp
      ignore_errors: yes

    - name: Ensure HAProxy is restarted
      service:
        name: haproxy
        state: restarted
        enabled: yes
